<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">百变脸相机 Logo 方案一</title>
  <desc id="desc">一个可爱的果冻脸相机图标，带有大眼睛镜头和柔和渐变。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8F1"/>
      <stop offset="55%" stop-color="#FFD8CB"/>
      <stop offset="100%" stop-color="#FF8F76"/>
    </linearGradient>
    <linearGradient id="face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFDF8"/>
      <stop offset="100%" stop-color="#FFE7DA"/>
    </linearGradient>
    <linearGradient id="lens" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#88DFFF"/>
      <stop offset="100%" stop-color="#3D8FFF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#8E3B24" flood-opacity=".18"/>
    </filter>
  </defs>

  <rect x="24" y="24" width="464" height="464" rx="138" fill="url(#bg)"/>
  <circle cx="398" cy="122" r="44" fill="#FFFFFF" opacity=".24"/>
  <circle cx="114" cy="402" r="58" fill="#FFB8A4" opacity=".28"/>

  <g filter="url(#shadow)">
    <path d="M123 154c0-31 25-56 56-56h154c31 0 56 25 56 56v31c26 7 45 31 45 59v87c0 47-38 85-85 85H163c-47 0-85-38-85-85v-87c0-28 19-52 45-59v-31z" fill="#FF9D82"/>
    <path d="M145 166c0-25 20-45 45-45h132c25 0 45 20 45 45v19H145v-19z" fill="#FFC3B2"/>
    <path d="M102 252c0-84 68-152 152-152h6c84 0 152 68 152 152v69c0 52-42 94-94 94H196c-52 0-94-42-94-94v-69z" fill="url(#face)"/>
    <path d="M159 371c31 21 61 31 92 31 37 0 69-11 103-34" fill="none" stroke="#161A25" stroke-width="18" stroke-linecap="round"/>
    <path d="M140 231c25-22 54-33 86-33 32 0 60 10 86 31 18-7 37-10 57-10 17 0 33 3 48 8v102c0 44-36 79-79 79H193c-44 0-79-35-79-79V227c9-3 19-5 26-5z" fill="#FFF6EF"/>

    <g transform="translate(166 214)">
      <circle cx="0" cy="0" r="41" fill="#0E1420"/>
      <circle cx="0" cy="0" r="28" fill="url(#lens)"/>
      <circle cx="-11" cy="-11" r="8" fill="#FFFFFF" opacity=".9"/>
      <circle cx="66" cy="6" r="32" fill="#0E1420"/>
      <circle cx="66" cy="6" r="21" fill="#FF7FA5"/>
      <circle cx="58" cy="-2" r="6" fill="#FFFFFF" opacity=".9"/>
    </g>

    <path d="M232 301c17-11 34-11 51 0" fill="none" stroke="#FF9C9C" stroke-width="12" stroke-linecap="round"/>
    <path d="M177 182c13-9 28-14 44-14" fill="none" stroke="#161A25" stroke-width="10" stroke-linecap="round" opacity=".82"/>
    <path d="M279 171c17 0 32 4 45 13" fill="none" stroke="#161A25" stroke-width="10" stroke-linecap="round" opacity=".82"/>
  </g>

  <g transform="translate(381 112)">
    <path d="M0-20l6 14 14 6-14 6-6 14-6-14-14-6 14-6z" fill="#FFF5A6"/>
  </g>
  <g transform="translate(113 137) rotate(-18)">
    <rect x="-25" y="-25" width="50" height="50" rx="14" fill="#8AE6D1" opacity=".92"/>
    <path d="M-8-25v50M8-25v50M-25-8h50M-25 8h50" stroke="#FFFFFF" stroke-width="5" opacity=".88"/>
  </g>
</svg>
